<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f4f6fb;padding:20px;min-height:100vh}
        .container{max-width:1400px;margin:auto;display:flex;flex-direction:column;gap:16px}

        /* Header */
        .header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:20px 28px;border-radius:16px}
        .header h1{font-size:1.5rem;display:flex;align-items:center;gap:10px}
        .header p{opacity:0.65;font-size:0.82rem;margin-top:5px}
        .nav-links{margin-top:12px;display:flex;gap:20px;flex-wrap:wrap}
        .nav-links a{color:white;text-decoration:none;opacity:0.65;font-size:0.82rem;transition:opacity 0.2s}
        .nav-links a:hover,.nav-links a.active{opacity:1}

        /* 🆕 加载进度条 */
        .loading-bar-container{background:white;border-radius:16px;padding:16px 24px;border:1px solid #eef2ff;display:none;align-items:center;gap:16px;flex-wrap:wrap}
        .loading-bar-container.active{display:flex}
        .loading-bar-label{font-size:13px;font-weight:600;color:#475569;white-space:nowrap}
        .loading-bar-track{flex:1;min-width:150px;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
        .loading-bar-fill{height:100%;background:linear-gradient(90deg,#bf0000,#ef4444);border-radius:4px;width:0%;transition:width 0.5s ease}
        .loading-bar-text{font-size:13px;font-weight:700;color:#bf0000;white-space:nowrap}
        .btn-outline{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;padding:4px 12px;border-radius:8px;cursor:pointer;font-size:11px}

        /* KPI */
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
        @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
        .stat-card{background:white;border-radius:16px;padding:16px 20px;border:1px solid #eef2ff;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
        .stat-title{font-size:12px;color:#64748b;margin-bottom:6px;display:flex;align-items:center;gap:5px}
        .stat-value{font-size:26px;font-weight:800;color:#1e293b}

        /* Main layout */
        .main-layout{display:grid;grid-template-columns:1fr 420px;gap:16px;align-items:start}
        @media(max-width:1100px){.main-layout{grid-template-columns:1fr}}

        /* Panel */
        .panel{background:white;border-radius:16px;border:1px solid #eef2ff;overflow:hidden}
        .panel-header{padding:14px 18px;border-bottom:1px solid #eef2ff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .panel-title{font-size:15px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:8px}
        .filters{display:flex;gap:8px;flex-wrap:wrap}
        .search-box{display:flex;align-items:center;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;padding:0 10px;gap:6px}
        .search-box input{border:none;background:transparent;padding:8px 4px;width:160px;outline:none;font-size:13px}
        .filter-select{padding:8px 12px;border:1px solid #e2e8f0;border-radius:10px;font-size:12px;background:white;color:#374151}
        .btn{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s}
        .btn-primary{background:#bf0000;color:white}
        .btn-primary:hover{background:#8b0000}

        /* Table */
        .table-area{overflow:auto;resize:vertical;min-height:200px;max-height:80vh;height:420px}
        table{width:100%;border-collapse:collapse;min-width:600px}
        th{background:#111827;color:white;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;position:sticky;top:0;z-index:1;white-space:nowrap}
        td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:12px;vertical-align:middle}
        tr:hover td{background:#f8fafc}

        /* Badges */
        .category-badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
        .category-preorder{background:#8b5cf6;color:white}
        .category-instock{background:#3b82f6;color:white}
        .category-food{background:#10b981;color:white}
        .category-health{background:#ef4444;color:white}
        .category-beauty{background:#ec4899;color:white}
        .category-daily{background:#f59e0b;color:white}
        .category-medicine{background:#8b5cf6;color:white}
        .category-drink{background:#06b6d4;color:white}
        .category-other{background:#6b7280;color:white}
        .stock-badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
        .stock-high{background:#dcfce7;color:#166534}
        .stock-low{background:#fed7aa;color:#9a3412}
        .stock-zero{background:#fee2e2;color:#b91c1c}
        .stock-loading{background:#fef3c7;color:#92400e}
        .action-btn{padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;background:#ef4444;color:white}
        .action-btn:hover{background:#dc2626}
        .action-btn:disabled{opacity:0.5;cursor:not-allowed}

        .pagination{display:flex;justify-content:center;gap:4px;padding:10px;border-top:1px solid #eef2ff;flex-wrap:wrap}
        .page-btn{padding:5px 10px;border:1px solid #e2e8f0;background:white;cursor:pointer;border-radius:7px;font-size:12px}
        .page-btn:hover{background:#f1f5f9;border-color:#bf0000}
        .page-btn.active{background:#bf0000;color:white;border-color:#bf0000}
        .page-btn:disabled{opacity:0.4;cursor:default}

        /* Outstock panel */
        .outstock-panel{background:white;border-radius:16px;border:1px solid #eef2ff;overflow:hidden;display:flex;flex-direction:column}
        .outstock-header{padding:14px 18px;border-bottom:1px solid #eef2ff}
        .outstock-title{font-size:15px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:8px;margin-bottom:10px}
        .tabs{display:flex;gap:0;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
        .tab{flex:1;padding:7px 4px;border:none;background:#f8fafc;cursor:pointer;font-size:11px;font-weight:600;color:#64748b;transition:all 0.2s;text-align:center}
        .tab.active{background:#bf0000;color:white}
        .tab:hover:not(.active){background:#f1f5f9}
        .outstock-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px;border-bottom:1px solid #eef2ff;background:#fafafa}
        .summary-item{text-align:center}
        .summary-label{font-size:10px;color:#64748b;margin-bottom:2px}
        .summary-value{font-size:16px;font-weight:800;color:#1e293b}
        .outstock-body{overflow:auto;resize:vertical;min-height:150px;max-height:70vh;height:360px}
        .record-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 18px;border-bottom:1px solid #f1f5f9;gap:8px}
        .record-item:hover{background:#fafafa}
        .record-name{font-size:12px;font-weight:600;color:#1e293b;line-height:1.4;margin-bottom:3px}
        .record-meta{font-size:10px;color:#94a3b8;display:flex;gap:8px;flex-wrap:wrap}
        .record-qty{font-size:14px;font-weight:700;color:#ef4444;white-space:nowrap}
        .prod-item{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid #f1f5f9;gap:8px}
        .prod-item:hover{background:#fafafa}
        .prod-name{font-size:12px;font-weight:600;color:#1e293b;line-height:1.4;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .prod-stats{display:flex;gap:12px;align-items:center;white-space:nowrap}
        .prod-count{font-size:13px;font-weight:700;color:#ef4444}
        .prod-orders{font-size:10px;color:#94a3b8}
        .day-item{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid #f1f5f9}
        .day-item:hover{background:#fafafa}
        .day-date{font-size:13px;font-weight:600;color:#1e293b}
        .day-bar-wrap{flex:1;margin:0 12px;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
        .day-bar{height:100%;background:#ef4444;border-radius:3px}
        .day-stats{display:flex;gap:10px;align-items:center;white-space:nowrap}
        .day-qty{font-size:13px;font-weight:700;color:#ef4444}
        .day-orders{font-size:10px;color:#94a3b8}
        .loading{text-align:center;padding:40px;color:#64748b}
        .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#bf0000;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 10px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{text-align:center;padding:40px 20px;color:#94a3b8;font-size:13px}
        .footer{text-align:center;padding:12px;color:#94a3b8;font-size:11px}
        .resize-hint{text-align:right;font-size:10px;color:#cbd5e1;padding:4px 10px;border-top:1px solid #f1f5f9;cursor:ns-resize;user-select:none}
        .resize-hint i{margin-right:4px}
        /* ============================================================
   📱 移动端适配
   ============================================================ */

/* 平板设备 */
@media (max-width: 1024px) {
    .main-layout { grid-template-columns: 1fr; gap: 12px; }
    .outstock-panel { order: 2; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

/* 手机设备 */
@media (max-width: 768px) {
    body { padding: 8px; }
    .container { gap: 10px; }
    
    .header { padding: 12px 14px; border-radius: 12px; }
    .header h1 { font-size: 1.1rem; }
    .header p { font-size: 0.7rem; }
    .nav-links { gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.15); }
    .nav-links a { font-size: 0.65rem; padding: 3px 8px; background: rgba(255,255,255,0.08); border-radius: 12px; white-space: nowrap; }
    .nav-links a.active { background: rgba(255,255,255,0.2); }
    
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .stat-card { padding: 10px 12px; border-radius: 10px; }
    .stat-title { font-size: 9px; }
    .stat-value { font-size: 18px; }
    
    .loading-bar-container { padding: 10px 14px; gap: 8px; border-radius: 10px; }
    .loading-bar-label { font-size: 11px; }
    .loading-bar-text { font-size: 11px; }
    .loading-bar-track { min-width: 60px; height: 6px; }
    .btn-outline { font-size: 10px; padding: 3px 8px; }
    
    .panel { border-radius: 12px; }
    .panel-header { padding: 10px 12px; flex-direction: column; align-items: stretch; gap: 8px; }
    .panel-title { font-size: 13px; }
    
    .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .filters .search-box { grid-column: 1 / -1; padding: 0 8px; }
    .filters .search-box input { width: 100%; font-size: 12px; padding: 6px 4px; }
    .filter-select { padding: 6px 8px; font-size: 10px; border-radius: 8px; width: 100%; }
    .btn { padding: 6px 10px; font-size: 10px; border-radius: 8px; justify-content: center; grid-column: 1 / -1; }
    
    .table-area { height: auto; max-height: 50vh; min-height: 250px; }
    table { font-size: 10px; min-width: 380px; }
    th, td { padding: 4px 5px; }
    th { font-size: 8px; }
    td { font-size: 9px; }
    td:first-child { font-size: 8px; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td:nth-child(2) { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .category-badge { font-size: 7px; padding: 1px 4px; }
    .stock-badge { font-size: 7px; padding: 1px 4px; }
    .action-btn { font-size: 8px; padding: 2px 6px; border-radius: 4px; }
    
    .pagination { padding: 6px 8px; gap: 3px; }
    .page-btn { padding: 3px 6px; font-size: 10px; border-radius: 5px; }
    
    .outstock-panel { border-radius: 12px; }
    .outstock-header { padding: 10px 12px; }
    .outstock-title { font-size: 13px; }
    .tab { font-size: 9px; padding: 4px 2px; }
    .outstock-summary { padding: 8px 12px; }
    .summary-value { font-size: 14px; }
    .outstock-body { height: 200px; }
    .record-item, .prod-item, .day-item { padding: 8px 12px; }
    .record-name, .prod-name, .day-date { font-size: 11px; }
    .record-qty, .prod-count, .day-qty { font-size: 12px; }
    
    .resize-hint { font-size: 8px; padding: 2px 8px; }
    .footer { font-size: 10px; padding: 10px; }
}
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <h1><i class="fas fa-warehouse"></i> 在庫管理システム</h1>
        <p>在庫一覧 | 出庫記録 | 8カテゴリ分類</p>
        <div class="nav-links">
            <a href="/products">📋 商品管理</a>
            <a href="/inventory" class="active">📊 在庫管理</a>
            <a href="/orders">🛒 贩卖信息</a>
            <a href="/benefit">💰 利益管理</a>
            <a href="/daily-summary">📈 每日总结</a>
             <a href="/gs-inventory" class="nav-link"><i class="fas fa-google"></i> GS在库管理</a>
        </div>
    </div>

    <!-- 🆕 加载进度条 -->
    <div class="loading-bar-container" id="loadingBarContainer">
        <span class="loading-bar-label"><i class="fas fa-spinner fa-spin"></i> 在庫読み込み中</span>
        <div class="loading-bar-track">
            <div class="loading-bar-fill" id="loadingBarFill" style="width:0%"></div>
        </div>
        <span class="loading-bar-text" id="loadingBarText">0 / 0</span>
        <button class="btn-outline" onclick="cancelLoading()"><i class="fas fa-times"></i></button>
    </div>

    <!-- KPI -->
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-title"><i class="fas fa-boxes"></i> 総商品数</div><div class="stat-value" id="totalItems">-</div></div>
        <div class="stat-card"><div class="stat-title"><i class="fas fa-cubes"></i> 総在庫数</div><div class="stat-value" id="totalStock">-</div></div>
        <div class="stat-card"><div class="stat-title"><i class="fas fa-yen-sign"></i> 在庫総額</div><div class="stat-value" id="totalValue">-</div></div>
        <div class="stat-card"><div class="stat-title"><i class="fas fa-exclamation-triangle"></i> 在庫不足</div><div class="stat-value" id="lowStockCount">-</div></div>
    </div>

    <!-- Main layout -->
    <div class="main-layout">

        <!-- Left: Inventory table -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title"><i class="fas fa-table" style="color:#bf0000"></i> 在庫一覧</div>
                <div class="filters">
                    <div class="search-box">
                        <i class="fas fa-search" style="color:#94a3b8;font-size:12px"></i>
                        <input type="text" id="searchInput" placeholder="商品名 / 管理番号..." onkeyup="applyFilters()">
                    </div>
                    <select id="categoryFilter" class="filter-select" onchange="applyFilters()">
                        <option value="all">全カテゴリ</option>
                        <option value="アニメ・グッズ（预售）">🎬 预售</option>
                        <option value="アニメ・グッズ（在库）">📦 在库</option>
                        <option value="食品・お菓子・天然生活">🌿 食品</option>
                        <option value="健康食品">🍎 健康</option>
                        <option value="美容・コスメ・ボディケア">💄 美容</option>
                        <option value="日用品雑貨">🏠 日用品</option>
                        <option value="医薬品">💊 医薬品</option>
                        <option value="水・ソフトドリンク">🥤 飲料</option>
                        <option value="その他">📦 その他</option>
                    </select>
                    <select id="sortSelect" class="filter-select" onchange="applyFilters()">
                        <option value="name">名前順</option>
                        <option value="stock_asc">在庫↑</option>
                        <option value="stock_desc">在庫↓</option>
                        <option value="price_asc">価格↑</option>
                        <option value="price_desc">価格↓</option>
                        <option value="value_desc">金額↓</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadInventory()"><i class="fas fa-sync-alt"></i> 更新</button>
                </div>
            </div>
            <div class="table-area" id="tableArea">
                <table id="inventoryTable">
                    <thead><tr>
                        <th>管理番号</th>
                        <th>商品名</th>
                        <th>カテゴリ</th>
                        <th>単価</th>
                        <th>在庫</th>
                        <th>金額</th>
                        <th>状態</th>
                        <th>操作</th>
                    </tr></thead>
                    <tbody id="inventoryTableBody">
                        <tr><td colspan="8" class="loading"><div class="spinner"></div>読込中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="resize-hint"><i class="fas fa-grip-lines"></i>ドラッグで高さ調整</div>
            <div class="pagination" id="pagination"></div>
        </div>

        <!-- Right: Outstock panel -->
        <div class="outstock-panel">
            <div class="outstock-header">
                <div class="outstock-title"><i class="fas fa-arrow-up" style="color:#ef4444"></i> 出庫記録（注文）</div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('detail')">明細</button>
                    <button class="tab" onclick="switchTab('product')">商品別</button>
                    <button class="tab" onclick="switchTab('day')">日別</button>
                </div>
            </div>
            <div class="outstock-summary">
                <div class="summary-item">
                    <div class="summary-label">出庫件数（30日）</div>
                    <div class="summary-value" id="outTotalQty">-</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">注文数（30日）</div>
                    <div class="summary-value" id="outTotalOrders">-</div>
                </div>
            </div>
            <div class="outstock-body" id="outstockBody">
                <div class="loading"><div class="spinner"></div>読込中...</div>
            </div>
            <div class="resize-hint"><i class="fas fa-grip-lines"></i>ドラッグで高さ調整</div>
        </div>

    </div>

    <div class="footer">最終更新: <span id="lastUpdate">-</span></div>
</div>

<script>
    // ===== 全局变量 =====
    let allProducts = [];
    let inventoryData = {};
    let filteredProducts = [];
    let currentPage = 1;
    let itemsPerPage = 50;
    let allRecords = [];
    let currentTab = 'detail';
    let isLoading = false;
    let loadingInterval = null;
    let loadingCancelled = false;

    // ===== Category helpers =====
    function getCategoryClass(c) {
        const m = {
            'アニメ・グッズ（预售）':'category-preorder','アニメ・グッズ（在库）':'category-instock',
            '食品・お菓子・天然生活':'category-food','健康食品':'category-health',
            '美容・コスメ・ボディケア':'category-beauty','日用品雑貨':'category-daily',
            '医薬品':'category-medicine','水・ソフトドリンク':'category-drink','その他':'category-other'
        };
        return m[c] || 'category-other';
    }
    function getCategoryIcon(c) {
        const m = {
            'アニメ・グッズ（预售）':'🎬','アニメ・グッズ（在库）':'📦','食品・お菓子・天然生活':'🌿',
            '健康食品':'🍎','美容・コスメ・ボディケア':'💄','日用品雑貨':'🏠',
            '医薬品':'💊','水・ソフトドリンク':'🥤','その他':'📦'
        };
        return m[c] || '📦';
    }
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    // ===== 🆕 异步加载库存 =====
    async function loadInventory() {
        const tbody = document.getElementById('inventoryTableBody');
        tbody.innerHTML = '<tr><td colspan="8" class="loading"><div class="spinner"></div>商品データ読み込み中...</td></tr>';
        
        try {
            // 1. 获取商品列表
            const res = await fetch('/api/products');
            if (!res.ok) throw new Error('商品データの取得に失敗しました');
            allProducts = await res.json();
            console.log('✅ 商品データ取得成功:', allProducts.length + '件');
            
            // 2. 初始化库存数据
            inventoryData = {};
            for (let p of allProducts) {
                inventoryData[p.manageNumber] = { stock: null, loading: true };
            }
            
            // 3. 显示商品列表（库存显示为"読込中"）
            filteredProducts = [...allProducts];
            updateStats();
            renderTable();
            
            // 4. 同步出库记录
            await syncRecords();
            await loadRecords();
            
            // 5. 启动库存加载
            await startInventoryLoading();
            
            document.getElementById('lastUpdate').innerText = new Date().toLocaleString();
            
        } catch (e) {
            console.error('❌ 加载失败:', e);
            tbody.innerHTML = `<tr><td colspan="8" style="color:red;text-align:center;padding:30px">
                ❌ 読込失敗: ${e.message}
                <br><br>
                <button onclick="loadInventory()" style="padding:8px 20px;border:none;background:#bf0000;color:white;border-radius:8px;cursor:pointer;">再試行</button>
            </td></tr>`;
        }
    }

    async function startInventoryLoading() {
        if (isLoading) return;
        
        // 如果没有商品数据，不启动
        if (!allProducts || allProducts.length === 0) {
            console.warn('⚠️ 商品データがありません');
            return;
        }
        
        // 显示进度条
        const barContainer = document.getElementById('loadingBarContainer');
        barContainer.classList.add('active');
        document.getElementById('loadingBarFill').style.width = '0%';
        document.getElementById('loadingBarText').textContent = '0 / ' + allProducts.length;
        
        isLoading = true;
        loadingCancelled = false;
        
        try {
            // 启动后台任务
            const startRes = await fetch('/api/inventory/start-load', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ total: allProducts.length })
            });
            const startData = await startRes.json();
            console.log('📦 库存加载启动:', startData);
            
            if (startData.status === 'started' || startData.status === 'loading') {
                // 轮询状态
                if (loadingInterval) clearInterval(loadingInterval);
                loadingInterval = setInterval(checkLoadingStatus, 2000);
            } else {
                console.error('❌ 启动加载失败:', startData);
                isLoading = false;
                barContainer.classList.remove('active');
                // 降级方案：使用同步方式
                await loadInventorySync();
            }
        } catch (e) {
            console.error('❌ 启动加载失败:', e);
            isLoading = false;
            barContainer.classList.remove('active');
            // 降级方案
            await loadInventorySync();
        }
    }

    async function checkLoadingStatus() {
        if (loadingCancelled) {
            clearInterval(loadingInterval);
            loadingInterval = null;
            isLoading = false;
            document.getElementById('loadingBarContainer').classList.remove('active');
            return;
        }
        
        try {
            const res = await fetch('/api/inventory/status');
            const data = await res.json();
            console.log('📊 加载状态:', data);
            
            // 更新进度条
            const progress = data.progress || 0;
            const total = data.total || allProducts.length || 1;
            const pct = Math.min(100, Math.round((progress / total) * 100));
            
            document.getElementById('loadingBarFill').style.width = pct + '%';
            document.getElementById('loadingBarText').textContent = progress + ' / ' + total;
            
            // 如果加载完成
            if (!data.loading && data.has_data) {
                clearInterval(loadingInterval);
                loadingInterval = null;
                isLoading = false;
                document.getElementById('loadingBarContainer').classList.remove('active');
                
                // 获取结果
                await fetchInventoryResult();
            }
            
            // 如果加载状态异常
            if (!data.loading && !data.has_data && progress === 0 && total === 0) {
                console.warn('⚠️ 加载状态异常，尝试降级方案');
                clearInterval(loadingInterval);
                loadingInterval = null;
                isLoading = false;
                document.getElementById('loadingBarContainer').classList.remove('active');
                await loadInventorySync();
            }
        } catch (e) {
            console.error('❌ 状态检查失败:', e);
        }
    }

    async function fetchInventoryResult() {
        try {
            const res = await fetch('/api/inventory/result');
            const data = await res.json();
            
            if (data.status === 'done' && data.data) {
                console.log('✅ 库存加载完成:', data.data.length + '件');
                // 更新库存数据
                for (let item of data.data) {
                    if (inventoryData[item.manageNumber]) {
                        inventoryData[item.manageNumber].stock = item.stock;
                        inventoryData[item.manageNumber].loading = false;
                    }
                }
                
                // 重新渲染表格
                renderTable();
                updateStats();
                document.getElementById('lastUpdate').innerText = new Date().toLocaleString() + ' (在庫読み込み完了)';
            }
        } catch (e) {
            console.error('❌ 获取库存结果失败:', e);
        }
    }

    // ===== 降级方案：同步加载库存 =====
    async function loadInventorySync() {
        console.log('🔄 降级方案: 使用同期方式加载库存...');
        const barContainer = document.getElementById('loadingBarContainer');
        barContainer.classList.add('active');
        document.getElementById('loadingBarFill').style.width = '50%';
        document.getElementById('loadingBarText').textContent = '同期読み込み中...';
        
        try {
            const res = await fetch('/api/inventory/all');
            const data = await res.json();
            console.log('✅ 同期加载完成:', data.length + '件');
            
            for (let item of data) {
                if (inventoryData[item.manageNumber]) {
                    inventoryData[item.manageNumber].stock = item.stock;
                    inventoryData[item.manageNumber].loading = false;
                }
            }
            
            barContainer.classList.remove('active');
            renderTable();
            updateStats();
            document.getElementById('lastUpdate').innerText = new Date().toLocaleString() + ' (同期完了)';
        } catch (e) {
            console.error('❌ 同期加载失败:', e);
            barContainer.classList.remove('active');
            // 即使失败，也将库存设为0
            for (let mn in inventoryData) {
                if (inventoryData[mn].loading) {
                    inventoryData[mn].stock = 0;
                    inventoryData[mn].loading = false;
                }
            }
            renderTable();
            updateStats();
        }
    }

    function cancelLoading() {
        loadingCancelled = true;
        if (loadingInterval) {
            clearInterval(loadingInterval);
            loadingInterval = null;
        }
        isLoading = false;
        document.getElementById('loadingBarContainer').classList.remove('active');
        
        // 将未加载的库存标记为0
        for (let mn in inventoryData) {
            if (inventoryData[mn].loading) {
                inventoryData[mn].stock = 0;
                inventoryData[mn].loading = false;
            }
        }
        renderTable();
        updateStats();
    }

    async function syncRecords() {
        try { await fetch('/api/sync-outstock-from-orders', { method: 'POST' }); } catch(e) {}
    }

    // ===== Stats =====
    function updateStats() {
        let totalStock = 0, totalValue = 0, lowStock = 0;
        for (let p of allProducts) {
            let s = inventoryData[p.manageNumber]?.stock;
            if (s === undefined || s === null) s = 0;
            totalStock += s;
            totalValue += (p.price || 0) * s;
            if (s > 0 && s < 10) lowStock++;
        }
        document.getElementById('totalItems').innerText = allProducts.length.toLocaleString();
        document.getElementById('totalStock').innerText = totalStock.toLocaleString();
        document.getElementById('totalValue').innerText = '¥' + totalValue.toLocaleString();
        document.getElementById('lowStockCount').innerText = lowStock;
    }

    // ===== Filters =====
    function applyFilters() {
        let f = [...allProducts];
        let s = document.getElementById('searchInput').value.toLowerCase();
        if (s) f = f.filter(p => (p.manageNumber||'').toLowerCase().includes(s) || (p.name||'').toLowerCase().includes(s));
        let c = document.getElementById('categoryFilter').value;
        if (c !== 'all') f = f.filter(p => p.category === c);
        let sort = document.getElementById('sortSelect').value;
        if (sort === 'price_asc') f.sort((a,b) => (a.price||0)-(b.price||0));
        else if (sort === 'price_desc') f.sort((a,b) => (b.price||0)-(a.price||0));
        else if (sort === 'stock_asc') {
            f.sort((a,b) => {
                const sa = inventoryData[a.manageNumber]?.stock ?? 0;
                const sb = inventoryData[b.manageNumber]?.stock ?? 0;
                return sa - sb;
            });
        } else if (sort === 'stock_desc') {
            f.sort((a,b) => {
                const sa = inventoryData[a.manageNumber]?.stock ?? 0;
                const sb = inventoryData[b.manageNumber]?.stock ?? 0;
                return sb - sa;
            });
        } else if (sort === 'value_desc') {
            f.sort((a,b) => {
                const va = (a.price||0) * (inventoryData[a.manageNumber]?.stock ?? 0);
                const vb = (b.price||0) * (inventoryData[b.manageNumber]?.stock ?? 0);
                return vb - va;
            });
        } else f.sort((a,b) => (a.name||'').localeCompare(b.name||''));
        filteredProducts = f;
        currentPage = 1;
        renderTable();
    }

    // ===== Render table =====
    function renderTable() {
        let tbody = document.getElementById('inventoryTableBody');
        let start = (currentPage - 1) * itemsPerPage;
        let page = filteredProducts.slice(start, start + itemsPerPage);
        
        if (!page.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty">該当データなし</td></tr>';
            renderPagination(0);
            return;
        }
        
        tbody.innerHTML = page.map(p => {
            const inv = inventoryData[p.manageNumber] || { stock: 0, loading: false };
            const s = inv.loading ? null : (inv.stock ?? 0);
            const v = (p.price||0) * (s || 0);
            
            let badge, txt;
            if (s === null) {
                badge = 'stock-loading';
                txt = '読込中...';
            } else if (s === 0) {
                badge = 'stock-zero';
                txt = '欠品';
            } else if (s < 10) {
                badge = 'stock-low';
                txt = '不足';
            } else {
                badge = 'stock-high';
                txt = '充足';
            }
            
            return `<tr>
                <td style="font-family:monospace;font-size:11px">${escapeHtml(p.manageNumber)}</td>
                <td style="max-width:200px;word-break:break-all;line-height:1.4">${escapeHtml(p.name)}</td>
                <td><span class="category-badge ${getCategoryClass(p.category)}">${getCategoryIcon(p.category)}</span></td>
                <td>¥${(p.price||0).toLocaleString()}</td>
                <td style="font-weight:700">${s !== null ? s : '⏳'}</td>
                <td>${s !== null ? '¥' + v.toLocaleString() : '⏳'}</td>
                <td><span class="stock-badge ${badge}">${txt}</span></td>
                <td><button class="action-btn" onclick="showOutStockModal('${p.manageNumber}','${escapeHtml(p.name).replace(/'/g,"\\'")}',${s !== null ? s : 0})" ${s === null ? 'disabled' : ''}>出庫</button></td>
            </tr>`;
        }).join('');
        renderPagination(filteredProducts.length);
    }

    function renderPagination(total) {
        let pages = Math.ceil(total / itemsPerPage);
        let div = document.getElementById('pagination');
        if (pages <= 1) { div.innerHTML = ''; return; }
        let s = Math.max(1, currentPage-2), e = Math.min(pages, currentPage+2);
        let html = `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
        if (s>1) { html+=`<button class="page-btn" onclick="changePage(1)">1</button>`; if(s>2) html+='<span style="padding:0 4px">…</span>'; }
        for (let i=s;i<=e;i++) html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
        if (e<pages) { if(e<pages-1) html+='<span style="padding:0 4px">…</span>'; html+=`<button class="page-btn" onclick="changePage(${pages})">${pages}</button>`; }
        html+=`<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
        div.innerHTML = html;
    }

    function changePage(p) {
        if (p < 1 || p > Math.ceil(filteredProducts.length/itemsPerPage)) return;
        currentPage = p;
        renderTable();
    }

    // ===== Load outstock records =====
    async function loadRecords() {
        try {
            const res = await fetch('/api/stock-records?limit=500');
            const data = await res.json();
            allRecords = (data.success && data.records) ? data.records : [];
            updateOutstockSummary();
            renderTab();
        } catch(e) {
            document.getElementById('outstockBody').innerHTML = '<div class="empty">読込失敗</div>';
        }
    }

    function updateOutstockSummary() {
        const totalQty = allRecords.reduce((sum, r) => sum + (r.quantity||0), 0);
        const orderSet = new Set(allRecords.filter(r=>r.orderNumber).map(r=>r.orderNumber));
        document.getElementById('outTotalQty').innerText = totalQty.toLocaleString();
        document.getElementById('outTotalOrders').innerText = orderSet.size.toLocaleString();
    }

    // ===== Tabs =====
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach((el,i) => {
            el.classList.toggle('active', ['detail','product','day'][i] === tab);
        });
        renderTab();
    }

    function renderTab() {
        if (currentTab === 'detail') renderDetail();
        else if (currentTab === 'product') renderProduct();
        else renderDay();
    }

    // Tab 1: 明細
    function renderDetail() {
        const body = document.getElementById('outstockBody');
        if (!allRecords.length) { body.innerHTML = '<div class="empty">出庫記録なし</div>'; return; }
        body.innerHTML = allRecords.map(r => `
            <div class="record-item">
                <div style="flex:1;min-width:0">
                    <div class="record-name">${escapeHtml(r.name)}</div>
                    <div class="record-meta">
                        <span>${r.timestamp||''}</span>
                        ${r.orderNumber ? `<span style="color:#3b82f6">${r.orderNumber}</span>` : ''}
                    </div>
                </div>
                <div class="record-qty">−${r.quantity||0}</div>
            </div>`).join('');
    }

    // Tab 2: 商品別集計
    function renderProduct() {
        const body = document.getElementById('outstockBody');
        if (!allRecords.length) { body.innerHTML = '<div class="empty">出庫記録なし</div>'; return; }
        const map = {};
        for (let r of allRecords) {
            const key = r.manageNumber || r.name;
            if (!map[key]) map[key] = { name: r.name, manageNumber: r.manageNumber, qty: 0, orders: new Set() };
            map[key].qty += r.quantity || 0;
            if (r.orderNumber) map[key].orders.add(r.orderNumber);
        }
        const sorted = Object.values(map).sort((a,b) => b.qty - a.qty);
        const maxQty = sorted[0]?.qty || 1;
        body.innerHTML = sorted.map(p => `
            <div class="prod-item">
                <div style="flex:1;min-width:0">
                    <div class="prod-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
                    <div style="font-size:10px;color:#94a3b8;font-family:monospace">${p.manageNumber||''}</div>
                    <div style="margin-top:5px;height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden">
                        <div style="height:100%;background:#ef4444;border-radius:2px;width:${Math.round(p.qty/maxQty*100)}%"></div>
                    </div>
                </div>
                <div class="prod-stats">
                    <div>
                        <div class="prod-count">${p.qty}</div>
                        <div class="prod-orders">${p.orders.size}注文</div>
                    </div>
                </div>
            </div>`).join('');
    }

    // Tab 3: 日別集計
    function renderDay() {
        const body = document.getElementById('outstockBody');
        if (!allRecords.length) { body.innerHTML = '<div class="empty">出庫記録なし</div>'; return; }
        const map = {};
        for (let r of allRecords) {
            const day = (r.timestamp||'').slice(0,10);
            if (!day) continue;
            if (!map[day]) map[day] = { qty: 0, orders: new Set() };
            map[day].qty += r.quantity || 0;
            if (r.orderNumber) map[day].orders.add(r.orderNumber);
        }
        const sorted = Object.entries(map).sort((a,b) => b[0].localeCompare(a[0]));
        const maxQty = Math.max(...sorted.map(([,v])=>v.qty), 1);
        body.innerHTML = sorted.map(([day, v]) => {
            const d = new Date(day);
            const label = `${d.getMonth()+1}/${d.getDate()}（${'日月火水木金土'[d.getDay()]}）`;
            return `<div class="day-item">
                <div class="day-date">${label}</div>
                <div class="day-bar-wrap"><div class="day-bar" style="width:${Math.round(v.qty/maxQty*100)}%"></div></div>
                <div class="day-stats">
                    <div class="day-qty">${v.qty}件</div>
                    <div class="day-orders">${v.orders.size}注文</div>
                </div>
            </div>`;
        }).join('');
    }

    // ===== Manual outstock =====
    async function showOutStockModal(id, name, currentStock) {
        if (currentStock <= 0) { alert(`❌ ${name}\n在庫なし`); return; }
        let qty = prompt(`出庫処理\n商品: ${name}\n現在庫: ${currentStock}\n出庫数量:`, 1);
        if (!qty) return;
        let num = parseInt(qty);
        if (isNaN(num) || num <= 0) return;
        if (num > currentStock) { alert(`❌ 在庫不足（現在: ${currentStock}）`); return; }
        try {
            const res = await fetch('/api/outstock', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ manageNumber: id, quantity: num, note: '手動出庫' })
            });
            const result = await res.json();
            if (result.success) {
                await loadInventory();
                alert(`✅ ${name}\n${num}個出庫 → 残庫: ${result.newStock}`);
            } else {
                alert(`❌ 出庫失敗: ${result.error}`);
            }
        } catch(e) { alert(`❌ 出庫失敗: ${e.message}`); }
    }

    // ===== 启动 =====
    loadInventory();
</script>
</body>
</html>
